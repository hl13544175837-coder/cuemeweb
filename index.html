<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CueMe MVP</title>
  <style>
    :root {
      --bg: #f2f5fb;
      --card: #ffffff;
      --line: #dfe5f0;
      --text: #121826;
      --muted: #667085;
      --brand: #2861f2;
      --brand2: #5f86ff;
      --ok: #0f9b62;
    }

    * { box-sizing: border-box; letter-spacing: 0; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #f9fbff 0%, transparent 28%),
        radial-gradient(circle at 100% 0%, #eaf0ff 0%, transparent 32%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .phone {
      width: min(430px, 100%);
      height: min(905px, 96vh);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #d5ddeb;
      background: #f4f6fa;
      box-shadow: 0 22px 60px rgba(26, 40, 77, 0.22);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    .status {
      padding: 11px 14px 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
    }

    .top {
      padding: 5px 12px 12px;
      border-bottom: 1px solid #e6ebf3;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .logo {
      margin: 0;
      color: var(--brand);
      font-size: 35px;
      font-style: italic;
      font-weight: 800;
      line-height: 1;
    }

    .top button {
      border: 0;
      background: transparent;
      color: #30374a;
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
      padding: 0 6px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
      background: #f4f6fa;
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #fff;
      padding: 9px 10px;
      font-size: 14px;
      font-weight: 700;
      color: #445067;
      cursor: pointer;
    }

    .tab.active {
      border-color: transparent;
      background: linear-gradient(120deg, var(--brand), var(--brand2));
      color: #fff;
      box-shadow: 0 10px 22px rgba(40, 97, 242, 0.28);
    }

    .view {
      display: none;
      overflow: auto;
      padding: 0 12px 14px;
    }

    .view.active {
      display: block;
    }

    .notice {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px;
      align-items: center;
    }

    .notice strong {
      background: linear-gradient(120deg, var(--brand), var(--brand2));
      color: #fff;
      border-radius: 7px;
      padding: 4px 7px;
      font-size: 11px;
      white-space: nowrap;
    }

    .notice span {
      font-size: 14px;
      color: #2a3346;
    }

    .tips {
      margin-top: 10px;
      border-radius: 13px;
      padding: 12px;
      color: #fff;
      background: linear-gradient(130deg, #255cea, #6d43ff);
      box-shadow: 0 12px 28px rgba(45, 78, 237, 0.34);
      cursor: pointer;
    }

    .tips h3 {
      margin: 0 0 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips p {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .tips small {
      display: block;
      opacity: 0.92;
      margin-top: 7px;
      font-size: 12px;
    }

    .kpi {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 11px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .kpi div {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px;
      text-align: center;
    }

    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .kpi strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
    }

    .kpi em {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-style: normal;
      color: var(--ok);
    }

    .list {
      margin-top: 11px;
      display: grid;
      gap: 9px;
      padding-bottom: 78px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      transition: transform 0.18s ease;
    }

    .item:hover { transform: translateY(-1px); }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, #4a79ff, #7f4dff);
      overflow: hidden;
      border: 1px solid #d7deed;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta h4 {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 700;
    }

    .meta p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .ctr {
      font-size: 12px;
      font-weight: 700;
      color: #1f5be8;
      border: 1px solid #cfe0ff;
      background: #edf3ff;
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .chat-header {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      padding: 12px;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .chat-header .avatar {
      width: 64px;
      height: 64px;
      font-size: 24px;
    }

    .chat-header h3 {
      margin: 0 0 5px;
      font-size: 19px;
    }

    .chat-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .start-btn {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(120deg, var(--brand), var(--brand2));
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 10px;
      cursor: pointer;
    }

    .quick {
      margin-top: 10px;
      display: flex;
      gap: 7px;
      overflow: auto;
      padding-bottom: 4px;
    }

    .quick button {
      border: 1px solid #cfe0ff;
      background: #edf3ff;
      color: #29508f;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      white-space: nowrap;
      cursor: pointer;
    }

    .log {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      padding: 10px;
      min-height: 300px;
      max-height: 420px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .msg {
      max-width: 85%;
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .msg.agent {
      border: 1px solid #dee4f0;
      background: #fff;
      color: #263047;
    }

    .msg.user {
      margin-left: auto;
      border: 1px solid #b9d2ff;
      background: #dce9ff;
      color: #14335f;
    }

    .composer {
      border-top: 1px solid #e5eaf2;
      background: #f5f7fb;
      padding: 10px 12px;
    }

    .compose {
      border: 1px solid #d7deeb;
      border-radius: 15px;
      background: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 6px 6px 6px 10px;
    }

    .compose input {
      border: 0;
      outline: none;
      font-size: 16px;
      min-width: 0;
    }

    .send {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 11px;
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand2));
      cursor: pointer;
      font-size: 18px;
    }

    @media (max-width: 430px) {
      body { padding: 0; }
      .phone { width: 100vw; height: 100vh; border-radius: 0; border: 0; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="status">
      <div id="clock">15:42</div>
      <div>5G · 100%</div>
    </div>

    <header class="top">
      <h1 class="logo">CueMe</h1>
      <button aria-label="关闭">×</button>
    </header>

    <section class="tabs">
      <button class="tab active" data-tab="list">角色列表</button>
      <button class="tab" data-tab="chat">角色对话</button>
    </section>

    <section class="view active" id="listView">
      <div class="notice">
        <strong>公告</strong>
        <span>CueMe MVP：支持列表推荐、Tips、快捷对话与基础记忆。</span>
      </div>

      <article class="tips" id="tipsCard">
        <h3>NEW 热点速览</h3>
        <p>量子芯片 Willow 发布，点击查看 3 条外露热点与详情解读。</p>
        <small>按钮意图：了解详情（提高 Tips 命中率）</small>
      </article>

      <section class="kpi">
        <div>
          <span>曝光量</span>
          <strong>296,083</strong>
          <em>环比 +1w</em>
        </div>
        <div>
          <span>点击量</span>
          <strong>1,821</strong>
          <em>CTR 0.62%</em>
        </div>
        <div>
          <span>对话转化</span>
          <strong>40.06%</strong>
          <em>目标 45%+</em>
        </div>
      </section>

      <section class="list" id="roleList"></section>
    </section>

    <section class="view" id="chatView">
      <section class="chat-header">
        <div class="avatar" id="chatAvatar">C</div>
        <div>
          <h3 id="chatName">CueMe</h3>
          <p id="chatDesc">学习工作生活，我都能帮你。</p>
        </div>
        <button class="start-btn" id="startChatBtn">开始对话</button>
      </section>

      <div class="quick">
        <button data-quick="帮我做今天的学习计划">学习计划</button>
        <button data-quick="给我一个10万字减肥计划框架">长文写作</button>
        <button data-quick="我今天有点emo，陪我聊聊">情绪陪伴</button>
        <button data-quick="给我3个剧情分支选项">剧情分支</button>
      </div>

      <section class="log" id="chatLog">
        <div class="msg agent">Hi，我是 CueMe。你可以先选一个角色，或者直接发需求，我会给你可执行输出。</div>
        <div class="msg agent">当前 MVP 已支持：快捷回复、首语引导、简易记忆、长文框架生成。</div>
      </section>
    </section>

    <section class="composer">
      <div class="compose">
        <input id="input" type="text" placeholder="正在生成答案..." />
        <button class="send" id="sendBtn">➤</button>
      </div>
    </section>
  </main>

  <script>
    const roles = [
      { name: "CueMe", desc: "介绍一下人类20年半吊子数据分析和科研写作", ctr: "CTR 24.69%", mark: "C", img: "assets/avatars/cueme-hero.png" },
      { name: "超强写手程章", desc: "写作框架搭建、论文改写、长文扩写", ctr: "CTR 19.69%", mark: "程", img: "assets/avatars/chengzhang.png" },
      { name: "学习讲题助手", desc: "题目有不懂，随时来问我", ctr: "CTR 16.60%", mark: "学", img: "assets/avatars/xuexi.png" },
      { name: "健康问答助手", desc: "健康问题24小时在线解答", ctr: "CTR 15.76%", mark: "健", img: "assets/avatars/jiankang.png" },
      { name: "灵魂画师小索", desc: "画一个奥特曼和怪兽一起在立冬吃饺子", ctr: "CTR 15.57%", mark: "索", img: "assets/avatars/xiaosuo.png" },
      { name: "爱聊天的琉璃", desc: "今天想聊点什么？", ctr: "CTR 15.01%", mark: "琉", img: "assets/avatars/liuli.png" }
    ];

    const roleList = document.getElementById("roleList");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const listView = document.getElementById("listView");
    const chatView = document.getElementById("chatView");
    const chatName = document.getElementById("chatName");
    const chatDesc = document.getElementById("chatDesc");
    const chatAvatar = document.getElementById("chatAvatar");
    const chatLog = document.getElementById("chatLog");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    let currentRole = roles[0];
    let memory = "";

    function pad(num) { return String(num).padStart(2, "0"); }
    function tickClock() {
      const now = new Date();
      document.getElementById("clock").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }
    tickClock();
    window.setInterval(tickClock, 15000);

    function addMsg(type, text) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function switchTab(name) {
      tabs.forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
      listView.classList.toggle("active", name === "list");
      chatView.classList.toggle("active", name === "chat");
    }

    function selectRole(role) {
      currentRole = role;
      chatName.textContent = role.name;
      chatDesc.textContent = role.desc;
      chatAvatar.innerHTML = role.img ? `<img src="${role.img}" alt="${role.name} 头像">` : role.mark;
      switchTab("chat");
      addMsg("agent", `我是 ${role.name}。告诉我你的目标，我会给你一版可执行方案。`);
    }

    function renderRoles() {
      roleList.innerHTML = "";
      roles.forEach((role) => {
        const item = document.createElement("article");
        item.className = "item";
        const avatarHTML = role.img ? `<img src="${role.img}" alt="${role.name} 头像">` : role.mark;
        item.innerHTML = `
          <div class="avatar">${avatarHTML}</div>
          <div class="meta">
            <h4>${role.name}</h4>
            <p>${role.desc}</p>
          </div>
          <div class="ctr">${role.ctr}</div>
        `;
        item.addEventListener("click", () => selectRole(role));
        roleList.appendChild(item);
      });
    }

    function buildReply(text) {
      const t = text.toLowerCase();
      if (t.includes("计划")) return "收到。先给你 3 步：目标拆解、时间分块、每日复盘。你要我直接给今天的详细日程表吗？";
      if (t.includes("长文") || t.includes("10万")) return "可以。MVP 先给你“标题-大纲-章节扩写”流程，先确认题目和受众，我再输出第一章样稿。";
      if (t.includes("emo") || t.includes("聊聊")) return "我在。先不用急着解决问题，你可以先告诉我今天最卡的一件事，我陪你拆开它。";
      if (t.includes("剧情")) return "给你 3 个分支：A继续探索 / B询问细节 / C反向挑战。你选一个，我继续生成后续剧情。";
      if (t.includes("你好")) return "你好呀，我记住你来了。接下来你更想聊学习、写作，还是生活决策？";
      return `已收到：${text}。我会按 ${currentRole.name} 的风格继续回答，并尽量给你可直接执行的内容。`;
    }

    function send(text) {
      const content = text.trim();
      if (!content) return;
      addMsg("user", content);
      memory = content;
      input.value = "";
      sendBtn.disabled = true;
      window.setTimeout(() => {
        addMsg("agent", buildReply(content));
        sendBtn.disabled = false;
      }, 260);
    }

    tabs.forEach((tab) => tab.addEventListener("click", () => switchTab(tab.dataset.tab)));
    document.querySelectorAll("[data-quick]").forEach((btn) => btn.addEventListener("click", () => send(btn.dataset.quick)));
    document.getElementById("startChatBtn").addEventListener("click", () => addMsg("agent", `欢迎回来。上次你说的是：「${memory || "还没有历史输入"}」。我们从这里继续。`));
    document.getElementById("tipsCard").addEventListener("click", () => addMsg("agent", "Tips 详情：本周科技互联网类点击率更高，建议优先外露 3 条强相关热点。"));
    sendBtn.addEventListener("click", () => send(input.value));
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(input.value); });

    renderRoles();
    selectRole(roles[0]);
    switchTab("list");
  </script>
</body>
</html>
